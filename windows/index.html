<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iMessage Gateway</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 460px;
           margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.3rem; }
    label { display: block; margin: 14px 0 4px; font-weight: 600; font-size: .9rem; }
    input, textarea { width: 100%; padding: 10px; border-radius: 8px;
                      border: 1px solid #8888; font: inherit; box-sizing: border-box; }
    textarea { min-height: 90px; resize: vertical; }
    button { margin-top: 16px; width: 100%; padding: 12px; border: 0; border-radius: 8px;
             background: #0a84ff; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    #status { margin-top: 14px; padding: 10px; border-radius: 8px; display: none; }
    #status.ok  { display: block; background: #1e7d3222; color: #1e7d32; }
    #status.err { display: block; background: #c6282822; color: #c62828; }
  </style>
</head>
<body>
  <h1>📱 iMessage Gateway</h1>

  <label for="key">API key</label>
  <input id="key" type="password" placeholder="the API_KEY you set" />

  <label for="to">To (name, phone, or email)</label>
  <input id="to" type="text" placeholder="Person X" />

  <label for="msg">Message</label>
  <textarea id="msg" placeholder="Type your message…"></textarea>

  <button id="send">Send iMessage</button>
  <div id="status"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const status = $("status");

    $("send").addEventListener("click", async () => {
      const btn = $("send");
      status.className = "";
      btn.disabled = true;
      btn.textContent = "Sending…";
      try {
        const res = await fetch("/send", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-Api-Key": $("key").value },
          body: JSON.stringify({ to: $("to").value, message: $("msg").value }),
        });
        const data = await res.json();
        if (res.ok) {
          status.className = "ok";
          status.textContent = "✅ Sent to " + (data.to || "");
          $("msg").value = "";
        } else {
          status.className = "err";
          status.textContent = "❌ " + (data.error || res.status);
        }
      } catch (e) {
        status.className = "err";
        status.textContent = "❌ " + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Send iMessage";
      }
    });
  </script>
</body>
</html>
